<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>外送記帳</title>
  <!-- PWA 設定 -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="外送記帳">
  <!-- 字型：標題用 Syne，內文用 Noto Sans TC -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Chart.js 圖表庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">

  <!-- 首頁 (修改為固定 Tabs 防止閃爍) -->
  <section class="page active" id="page-home" style="padding:0; display:flex; flex-direction:column; overflow:hidden;">
    <div id="home-top-content"></div> <!-- JS 只渲染上半部 -->
    <div style="padding: 0 16px;">
      <div class="slide-tabs tabs-2">
        <div class="slide-bg" id="home-tab-bg" style="transform: translateX(0%);"></div>
        <button class="slide-btn active" id="btn-home-schedule" onclick="switchHomeTab('schedule', 0)">平台日程表</button>
        <button class="slide-btn" id="btn-home-goal" onclick="switchHomeTab('goal', 1)">目標進度</button>
      </div>
    </div>
    <div id="home-bottom-content" style="flex:1; overflow-y:auto; padding: 0 16px 24px;"></div> <!-- JS 渲染下半部 -->
  </section>

  <!-- ══ 查看記錄 (防閃爍固定結構) ═══════════════════════════════════ -->
  <section class="page" id="page-history" style="padding:0; display:flex; flex-direction:column; overflow:hidden;">
    
    <!-- 固定的標題 -->
    <div style="padding: 16px 16px 0; text-align: center;">
      <div class="home-pg-title" style="display:inline-block;">查看記錄</div>
    </div>
    
    <!-- 固定的圓角滑動特效：紀錄 5 等分 -->
    <div class="slide-tabs tabs-5" style="margin: 12px 16px 8px;">
      <div class="slide-bg" id="hist-tab-bg" style="transform: translateX(0%);"></div>
      <button class="slide-btn active" id="btn-hist-day" onclick="switchHistTab('day', 0)">日</button>
      <button class="slide-btn" id="btn-hist-week" onclick="switchHistTab('week', 1)">週</button>
      <button class="slide-btn" id="btn-hist-biweek" onclick="switchHistTab('biweek', 2)">雙週</button>
      <button class="slide-btn" id="btn-hist-month" onclick="switchHistTab('month', 3)">月</button>
      <button class="slide-btn" id="btn-hist-year" onclick="switchHistTab('year', 4)">年</button>
    </div>

    <!-- 動態內容區塊：日曆與記錄列表會由 JS 渲染到這裡面 -->
    <div id="hist-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
    
  </section>

  <!-- ══ 新增／編輯記錄分頁 ════════════════════════════ -->
  <section class="page" id="page-add">
    <div class="pg-title" id="add-page-title">新增記錄</div>    
    <!-- 平台選擇 -->
    <div style="margin-bottom:14px">
      <div class="form-lbl">🚴 選擇平台</div>
      <div id="platform-chips" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
    </div>
    <!-- 日期 -->
    <div class="fg" style="margin-bottom:14px">
      <label>📆 日期</label>
      <input type="date" class="finp" id="f-date">
    </div>
    <!-- 打卡時間（上線/下線） -->
    <div style="margin-bottom:10px">
      <div class="form-lbl">⏱ 打卡記錄</div>
      <div style="display:flex;gap:8px">
        <div class="fg" style="flex:1">
          <label>上線時間</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input type="time" class="finp" id="f-punch-in" style="flex:1" oninput="autoCalcHours()">
            <button class="quick-btn" onclick="setPunchNow('in')">現在</button>
          </div>
        </div>
        <div class="fg" style="flex:1">
          <label>下線時間</label>
          <div style="display:flex;gap:6px;align-items:center">
            <input type="time" class="finp" id="f-punch-out" style="flex:1" oninput="autoCalcHours()">
            <button class="quick-btn" onclick="setPunchNow('out')">現在</button>
          </div>
        </div>
      </div>
    </div>
    <!-- 工時（自動計算） -->
    <div class="fg" style="margin-bottom:14px">
      <label>🕐 工時（小時，上線/下線自動計算）</label>
      <input type="number" class="finp" id="f-hours" placeholder="自動計算或手動輸入" inputmode="decimal" step="0.1">
    </div>
    <!-- 單數 + 行程收入 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="fg">
        <label>📦 接單數（單）</label>
        <input type="number" class="finp" id="f-orders" placeholder="0" inputmode="numeric" oninput="calcAddTotal()">
      </div>
      <div class="fg">
        <label>💰 行程收入（NT$）</label>
        <input type="number" class="finp" id="f-income" placeholder="0" inputmode="decimal" oninput="calcAddTotal()">
      </div>
    </div>
    <!-- 固定發布獎勵 + 臨時獎勵 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="fg">
        <label>🎁 固定發布獎勵（NT$）</label>
        <input type="number" class="finp" id="f-bonus" placeholder="0" inputmode="decimal" oninput="calcAddTotal()">
      </div>
      <div class="fg">
        <label>⚡ 臨時獎勵（NT$）</label>
        <input type="number" class="finp" id="f-temp-bonus" placeholder="0" inputmode="decimal" oninput="calcAddTotal()">
      </div>
    </div>
    <!-- 小費 -->
    <div class="fg" style="margin-bottom:14px">
      <label>🤑 小費（NT$）</label>
      <input type="number" class="finp" id="f-tips" placeholder="0" inputmode="decimal" oninput="calcAddTotal()">
    </div>
    <!-- 本筆總收入（自動加總） -->
    <div id="add-total-card" style="background:var(--acc-d);border:1px solid rgba(255,107,53,.3);border-radius:var(--r);padding:14px;margin-bottom:14px;text-align:center">
      <div style="font-size:11px;color:var(--acc);letter-spacing:.5px;margin-bottom:4px">本筆總收入</div>
      <div style="font-family:var(--mono);font-size:36px;font-weight:700;color:var(--acc)">NT$ <span id="add-total-val">0</span></div>
      <div id="add-breakdown" style="font-size:11px;color:var(--acc);margin-top:4px;opacity:.7"></div>
    </div>
    <!-- 備註 -->
    <div class="fg" style="margin-bottom:20px">
      <label>📝 備註（選填）</label>
      <input type="text" class="finp" id="f-note" placeholder="天氣、路況或其他記事">
    </div>
    <!-- 儲存按鈕 -->
    <button class="btn-acc" id="add-confirm" style="width:100%; padding:14px; font-size:16px; font-weight:700;">💾 儲存記錄</button>
  </section>

  <!-- ══ 收入分析 ═══════════════════════════════════════ -->
  <section class="page" id="page-report">
    <div class="pg-title">收入分析</div>
    <!-- 月份導覽 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="mbtn" id="rpt-prev">◀</button>
      <span id="rpt-label" style="font-size:15px;font-weight:600"></span>
      <button class="mbtn" id="rpt-next">▶</button>
    </div>
    <!-- 報表 Tab -->
    <!-- 圓角滑動特效：報表 4 等分 -->
    <div class="slide-tabs tabs-4" id="rpt-tabs">
      <div class="slide-bg" id="rpt-tab-bg" style="transform: translateX(0%);"></div>
      <button class="slide-btn active" onclick="switchRptTab('overview', 0, this)">總覽</button>
      <button class="slide-btn" onclick="switchRptTab('trend', 1, this)">趨勢</button>
      <button class="slide-btn" onclick="switchRptTab('compare', 2, this)">比較</button>
      <button class="slide-btn" onclick="switchRptTab('top3', 3, this)">TOP3</button>
    </div>
    <!-- 各分頁內容 -->
    <div id="rv-overview"></div>
    <div id="rv-trend"   style="display:none"></div>
    <div id="rv-compare" style="display:none"></div>
    <div id="rv-top3"    style="display:none"></div>
  </section>

  <!-- ══ 車輛管理 (新頁面) ═══════════════════════════════════ -->
  <section class="page" id="page-vehicles" style="padding: 16px 16px 0; display:flex; flex-direction:column; overflow:hidden;">
    <!-- 固定的標題與 30x30 滿版新增按鈕 -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div style="width:30px;"></div> <!-- 排版平衡 -->
      <div class="pg-title" style="margin:0;">車輛管理</div>
      
      <!-- 滿版 30x30 新增按鈕 -->
      <button onclick="openAddVehicle()" title="新增車輛" style="width:30px; height:30px; padding:0; background:transparent; border:none; cursor:pointer;">
        <img src="/images/scooter.png" alt="新增車輛" style="width:100%; height:100%; object-fit:contain;">
      </button>
    </div>
    
    <!-- 圓角滑動特效切換 Tab -->
    <div class="slide-tabs">
      <div class="slide-bg" id="veh-tab-bg"></div>
      <button class="slide-btn active" id="btn-veh-fuel" onclick="switchVehicleTab('fuel')">車輛燃料</button>
      <button class="slide-btn" id="btn-veh-maint" onclick="switchVehicleTab('maintenance')">車輛保養維修</button>
    </div>

    <!-- 動態列表容器 (JS 只會更新這裡，不會動到上方的按鈕) -->
    <div id="vehicle-content" style="flex:1; overflow-y:auto; padding-top:10px; padding-bottom:24px;"></div>
  </section>

  <!-- ══ 功能設定 ════════════════════════════════════ -->
  <section class="page" id="page-settings">
    <div class="pg-title">功能設定</div>
    <div id="settings-content"></div>
  </section>

<!-- ══ 底部導覽列 ══════════════════════════════════ -->
  <nav id="nav">
    <!-- 首頁：點擊前=首頁1，點擊後=首頁2 -->
    <div class="ni active" data-pg="home" data-img1="images/home1.png" data-img2="images/home2.png">
      <img class="ni-img" src="images/home2.png" alt="首頁">
      <span class="lb">首頁</span>
    </div>
    
    <!-- 紀錄：點擊前=紀錄1，點擊後=紀錄2 -->
    <div class="ni" data-pg="history" data-img1="images/history1.png" data-img2="images/history2.png">
      <img class="ni-img" src="images/history1.png" alt="查看記錄">
      <span class="lb">查看記錄</span>
    </div>
    
    <!-- 新增記錄：點擊前=新增1，點擊後=新增2 -->
    <div class="ni" data-pg="add" data-img1="images/add-record1.png" data-img2="images/add-record2.png">
      <img class="ni-img" src="images/add-record1.png" alt="新增">
      <span class="lb">新增</span>
    </div>
    
    <!-- 報表：點擊前=圖表1，點擊後=圖表2 -->
    <div class="ni" data-pg="report" data-img1="images/report1.png" data-img2="images/report2.png">
      <img class="ni-img" src="images/report1.png" alt="收入分析">
      <span class="lb">收入分析</span>
    </div>

    <!-- 🌟 車輛管理 (新增)：放置在設定左邊，使用機車圖示 -->
    <div class="ni" data-pg="vehicles" data-img1="images/scooter1.png" data-img2="images/scooter2.png">
      <!-- 預設顯示未選中的黑色 1 號圖 -->
      <img class="ni-img" src="images/scooter1.png" alt="車輛管理">
      <span class="lb">車輛管理</span>
    </div>
    
    <!-- 設定：點擊前=設定1，點擊後=設定2 -->
    <div class="ni" data-pg="settings" data-img1="images/settings1.png" data-img2="images/settings2.png">
      <img class="ni-img" src="images/settings1.png" alt="設定">
      <span class="lb">設定</span>
    </div>
  </nav>

<!-- ══ 搜尋 Overlay ════════════════════════════════ -->
<div class="overlay-page" id="search-page">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeOverlay('search-page')">✕</button>
    <h2>🔍 搜尋記錄</h2>
    <div style="width:36px"></div>
  </div>
  <div class="overlay-body">
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input type="text" class="finp" id="search-kw" placeholder="關鍵字、平台名稱、金額..." style="flex:1">
      <button onclick="doSearch()" class="btn-acc" style="padding:10px 16px;border-radius:var(--rs);white-space:nowrap">搜尋</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input type="date" class="finp" id="search-from" style="flex:1">
      <input type="date" class="finp" id="search-to"   style="flex:1">
    </div>
    <div id="search-results" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
</div>

<!-- ══ 設定子頁 Overlay ════════════════════════════ -->
<div class="overlay-page" id="sub-page">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeOverlay('sub-page')">✕</button>
    <h2 id="sub-title">設定</h2>
    <button class="bar-btn confirm" id="sub-add-btn" style="display:none" onclick="subAddAction()">＋</button>
  </div>
  <div class="overlay-body" id="sub-body"></div>
</div>

<!-- ══ 詳情 Overlay ════════════════════════════════ -->
<div id="detail-overlay">
  <div id="detail-box">
    <div class="top-bar" style="border-radius:20px 20px 0 0">
      <button class="bar-btn" onclick="closeDetailOverlay()">✕</button>
      <h2>記錄詳情</h2>
      <button class="bar-btn" id="detail-edit-btn">編輯</button>
    </div>
    <div id="detail-body" style="padding:16px 16px 32px;overflow-y:auto;max-height:70vh"></div>
  </div>
</div>

<!-- ══ 自訂確認框 ══════════════════════════════════ -->
<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button id="confirm-cancel-btn" style="flex:1;padding:12px;border-radius:var(--rs);border:none;background:var(--sf2);color:var(--t2);font-size:14px;font-family:var(--sans);cursor:pointer">取消</button>
      <button id="confirm-ok-btn"     style="flex:1;padding:12px;border-radius:var(--rs);border:none;background:var(--red);color:#fff;font-size:14px;font-family:var(--sans);cursor:pointer;font-weight:600">確定</button>
    </div>
  </div>
</div>

<!-- ══ Toast 提示訊息 ══════════════════════════════ -->
<div id="toast"></div>

<!-- 還原用隱藏 file input -->
<input type="file" id="restore-file" accept=".json" style="display:none">

<!-- ══ 全螢幕大日曆 Overlay ════════════════════════════ -->
<div class="overlay-page" id="full-calendar-overlay" style="background:var(--bg); z-index:900;">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeFullCalendar()">✕</button>
    <!-- 大日曆的月份切換與標題 -->
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="mbtn" onclick="changeFullCalMonth(-1)">◀</button>
      <h2 id="fc-title" style="font-size:18px;min-width:100px;text-align:center;"></h2>
      <button class="mbtn" onclick="changeFullCalMonth(1)">▶</button>
    </div>
    <div style="width:36px"></div> <!-- 平衡用空白 -->
  </div>
  <!-- 大日曆網格容器 -->
  <div class="overlay-body" id="fc-body" style="padding:0; display:flex; flex-direction:column; height:100%;">
    <!-- 星期標題 -->
    <div id="fc-dow" style="display:grid; grid-template-columns:repeat(7,1fr); background:var(--sf); border-bottom:1px solid var(--border);"></div>
    <!-- 日期格子 -->
    <div id="fc-grid" style="display:grid; grid-template-columns:repeat(7,1fr); flex:1; overflow-y:auto; background:var(--border); gap:1px;"></div>
  </div>
</div>

<!-- ══ 新增車輛 Overlay (由下往上滑出視窗) ════════════════════════ -->
<!-- 使用 overlay-page 類別，預設隱藏在畫面下方，加上 show 類別會滑上來 -->
<div class="overlay-page" id="vehicle-add-page">
  <div class="top-bar">
    <!-- 左側關閉按鈕 -->
    <button class="bar-btn" onclick="closeOverlay('vehicle-add-page')">✕</button>
    <!-- 置中標題 -->
    <h2>新增車輛</h2>
    <!-- 右側留白，保持標題絕對置中 -->
    <div style="width:36px"></div>
  </div>
  <!-- 視窗主體，表單與圖示顏色選擇器會由 script.js 渲染在此處 -->
  <div class="overlay-body" id="vehicle-add-body"></div>
</div>

<!-- ══ 新增燃料 Overlay ════════════════════════ -->
<div class="overlay-page" id="fuel-add-page">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeOverlay('fuel-add-page')">✕</button>
    <h2>新增車輛燃料</h2>
    <div style="width:36px"></div>
  </div>
  <div class="overlay-body">
    <div class="fg" style="margin-bottom:12px"><label>📆 日期</label><input type="date" class="finp" id="fuel-date"></div>
    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <div class="fg" style="flex:1"><label>上次里程 (km)</label><input type="number" class="finp" id="fuel-prev-km"></div>
      <div class="fg" style="flex:1"><label>加油里程 (km)</label><input type="number" class="finp" id="fuel-curr-km"></div>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <div class="fg" style="flex:1"><label>油量 (公升)</label><input type="number" class="finp" id="fuel-liters" step="0.01" oninput="calcFuelTotal()"></div>
      <div class="fg" style="flex:1"><label>油價 (單價)</label><input type="number" class="finp" id="fuel-price" step="0.1" oninput="calcFuelTotal()"></div>
    </div>
    <div class="fg" style="margin-bottom:12px"><label>折扣 (NT$)</label><input type="number" class="finp" id="fuel-discount" value="0" oninput="calcFuelTotal()"></div>
    
    <div style="background:var(--sf2); padding:12px; border-radius:12px; margin-bottom:20px; text-align:right;">
      <div style="font-size:12px; color:var(--t3);">折扣前總金額：<span id="fuel-before-total">0</span></div>
      <div style="font-size:14px; font-weight:bold; color:var(--t1); margin-top:4px;">實際付款：<span style="font-size:24px; color:var(--acc);" id="fuel-final-total">0</span></div>
    </div>
    <button onclick="saveFuelRecord()" class="btn-acc" style="width:100%; padding:14px; font-size:15px; font-weight:700;">💾 儲存燃料紀錄</button>
  </div>
</div>

<!-- ══ 新增保養維修 Overlay ════════════════════════ -->
<div class="overlay-page" id="maint-add-page">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeOverlay('maint-add-page')">✕</button>
    <h2>車輛保養維修</h2>
    <div style="width:36px"></div>
  </div>
  <div class="overlay-body">
    <div style="display:flex; gap:10px; margin-bottom:12px;">
      <div class="fg" style="flex:1"><label>📆 日期</label><input type="date" class="finp" id="maint-date"></div>
      <div class="fg" style="flex:1"><label>里程 (km)</label><input type="number" class="finp" id="maint-km"></div>
    </div>
    
    <!-- 項目複選 Chips -->
    <div class="fg" style="margin-bottom:16px;">
      <label>保養維修項目 (可複選)</label>
      <div style="display:flex; flex-wrap:wrap; gap:6px;" id="maint-items-container">
        <!-- JS 動態產生項目 -->
      </div>
    </div>

    <!-- 店家名稱與記憶歷史 -->
    <div class="fg" style="margin-bottom:16px;">
      <label>店家名稱</label>
      <input type="text" class="finp" id="maint-shop" placeholder="輸入車行名稱">
      <div id="shop-history-container" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;"></div>
    </div>

    <div class="fg" style="margin-bottom:12px;">
      <label>支付方式</label>
      <select class="fsel" id="maint-pay-method">
        <option value="現金">現金</option>
        <option value="電子支付">電子支付 (LinePay/街口等)</option>
        <option value="銀行帳戶">銀行帳戶 (轉帳/刷卡)</option>
      </select>
    </div>

    <div class="fg" style="margin-bottom:12px;"><label>📝 備註</label><input type="text" class="finp" id="maint-note"></div>
