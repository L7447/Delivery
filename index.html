<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>外送記帳</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FF6B35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="外送記帳">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body data-tab="home">
<div id="app">

  <!-- ══ 首頁 ══════════════════════════════════════ -->
  <section class="page active" id="page-home" style="padding:0; display:flex; flex-direction:column; overflow:hidden;">
    <div id="home-top-content" style="flex-shrink:0;"></div> 
    <div style="padding: 0 16px; flex-shrink:0;">
      <div class="slide-tabs tabs-2">
        <div class="slide-bg" id="home-tab-bg" style="transform: translateX(0%);"></div>
        <button class="slide-btn active" id="btn-home-schedule" onclick="switchHomeTab('schedule', 0)">平台日程表</button>
        <button class="slide-btn" id="btn-home-goal" onclick="switchHomeTab('goal', 1)">目標進度</button>
      </div>
    </div>
    <div id="home-bottom-content" style="flex:1; overflow-y:auto; padding: 0 16px 24px;"></div> 
  </section>

  <!-- ══ 查看記錄 ═══════════════════════════════════ -->
  <section class="page" id="page-history" style="padding:0; display:flex; flex-direction:column; overflow:hidden;">
    <div style="padding: 16px 16px 0; text-align: center;">
      <div class="home-pg-title" style="display:inline-block;">查看記錄</div>
    </div>
    <div class="slide-tabs tabs-5" style="margin: 12px 16px 8px;">
      <div class="slide-bg" id="hist-tab-bg" style="transform: translateX(0%);"></div>
      <button class="slide-btn active" id="btn-hist-day" onclick="switchHistTab('day', 0)">日</button>
      <button class="slide-btn" id="btn-hist-week" onclick="switchHistTab('week', 1)">週</button>
      <button class="slide-btn" id="btn-hist-biweek" onclick="switchHistTab('biweek', 2)">雙週</button>
      <button class="slide-btn" id="btn-hist-month" onclick="switchHistTab('month', 3)">月</button>
      <button class="slide-btn" id="btn-hist-year" onclick="switchHistTab('year', 4)">年</button>
    </div>
    <div id="hist-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
  </section>

  <!-- ══ 新增外送記錄 ════════════════════════════════ -->
  <section class="page" id="page-add" style="padding:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <div style="width:30px;"></div> 
      <div class="pg-title" id="add-page-title" style="margin:0;">新增記錄</div>    
      <button id="add-save-btn" onclick="confirmAddRecord()" title="儲存" style="width:30px; height:30px; padding:0; background:transparent; border:none; cursor:pointer; outline:none; transition:transform 0.2s;">
        <img id="add-save-img" src="images/Check1.png" alt="儲存" style="width:100%; height:100%; object-fit:contain;">
      </button>
    </div>
    <div style="margin-bottom:16px;"><div class="form-lbl">🚴 選擇平台</div><div id="platform-chips" style="display:flex;gap:8px;flex-wrap:wrap;"></div></div>
    <div style="display:grid; grid-template-columns:1.5fr 1fr; gap:12px; margin-bottom:12px;">
      <div class="fg"><label>📆 日期</label><input type="date" class="finp" id="f-date"></div>
      <div class="fg"><label>📦 單數</label><input type="number" class="finp" id="f-orders" placeholder="0" inputmode="numeric" oninput="calcAddTotal()"></div>
    </div>
    <div style="margin-bottom:16px;">
      <div class="form-lbl">⏱ 累計工時</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="fg" style="position:relative;"><input type="number" class="finp" id="f-hrs-val" placeholder="0" inputmode="numeric" style="padding-right:32px;"><span style="position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--t3); pointer-events:none;">時</span></div>
        <div class="fg" style="position:relative;"><input type="number" class="finp" id="f-min-val" placeholder="0" inputmode="numeric" style="padding-right:32px;"><span style="position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:12px; color:var(--t3); pointer-events:none;">分</span></div>
      </div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
      <div class="fg"><label>💰 行程收入 (NT$)</label><input type="number" class="finp" id="f-income" placeholder="0" inputmode="decimal" oninput="calcAddTotal()"></div>
      <div class="fg"><label>🤑 小費 (NT$)</label><input type="number" class="finp" id="f-tips" placeholder="0" inputmode="decimal" oninput="calcAddTotal()"></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
      <div class="fg"><label>🎁 固定獎勵</label><input type="number" class="finp" id="f-bonus" placeholder="0" inputmode="decimal" oninput="calcAddTotal()"></div>
      <div class="fg"><label>⚡ 臨時獎勵</label><input type="number" class="finp" id="f-temp-bonus" placeholder="0" inputmode="decimal" oninput="calcAddTotal()"></div>
    </div>
    <div style="background:var(--sf2); padding:12px 16px; border-radius:12px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;">
      <span style="font-size:13px; color:var(--acc); font-weight:600;">本筆總收入</span>
      <div style="font-family:var(--mono); font-size:28px; font-weight:800; color:var(--acc);">NT$ <span id="add-total-val">0</span></div>
    </div>
    <div class="fg" style="margin-bottom:20px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <label>📝 備註</label>
        <button type="button" onclick="addWeatherTag('🌧️下雨')" style="background:var(--blue-d); color:var(--blue); border:none; padding:4px 8px; border-radius:12px; font-size:11px; cursor:pointer;">+ 🌧️下雨</button>
      </div>
      <input type="text" class="finp" id="f-note" placeholder="天氣、路況或其他記事" style="margin-top:6px;">
    </div>
  </section>

  <!-- ══ 收入分析 ═══════════════════════════════════════ -->
  <section class="page" id="page-report">
    <div class="pg-title">收入分析</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="mbtn" id="rpt-prev">◀</button>
      <span id="rpt-label" style="font-size:15px;font-weight:600"></span>
      <button class="mbtn" id="rpt-next">▶</button>
    </div>
    <div class="slide-tabs tabs-4" id="rpt-tabs">
      <div class="slide-bg" id="rpt-tab-bg" style="transform: translateX(0%);"></div>
      <button class="slide-btn active" onclick="switchRptTab('overview', 0, this)">總覽</button>
      <button class="slide-btn" onclick="switchRptTab('trend', 1, this)">趨勢</button>
      <button class="slide-btn" onclick="switchRptTab('compare', 2, this)">比較</button>
      <button class="slide-btn" onclick="switchRptTab('top3', 3, this)">TOP3</button>
    </div>
    <div id="rv-overview"></div><div id="rv-trend" style="display:none"></div><div id="rv-compare" style="display:none"></div><div id="rv-top3" style="display:none"></div>
  </section>

  <!-- ══ 車輛管理 ═══════════════════════════════════════ -->
  <section class="page" id="page-vehicles" style="padding: 16px 16px 0; display:flex; flex-direction:column; overflow:hidden;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-shrink:0;">
      <div style="width:60px;"></div> <!-- 排版平衡 -->
      <div class="pg-title" style="margin:0;">車輛管理</div>
      <div style="display:flex; gap:12px;">
        <button onclick="openAddVehRec()" title="新增記錄" style="width:28px; height:28px; padding:0; background:var(--acc-d); border-radius:50%; border:none; cursor:pointer; color:var(--acc); font-size:18px; font-weight:bold; display:flex; align-items:center; justify-content:center;">➕</button>
        <button onclick="openAddVehicle()" title="新增車輛" style="width:28px; height:28px; padding:0; background:transparent; border:none; cursor:pointer;">
          <img src="images/scooter.png" alt="新增車輛" style="width:100%; height:100%; object-fit:contain;">
        </button>
      </div>
    </div>
    
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-shrink:0;">
      <button class="mbtn" onclick="changeVehMonth(-1)">◀</button>
      <h2 id="veh-month-label" style="font-size:15px; font-weight:700; color:var(--acc);"></h2>
      <button class="mbtn" onclick="changeVehMonth(1)">▶</button>
    </div>

    <div id="veh-selector-container" style="flex-shrink:0;"></div>

    <div class="slide-tabs tabs-2" style="margin-bottom:12px; flex-shrink:0;">
      <div class="slide-bg" id="veh-tab-bg" style="transform: translateX(0%);"></div>
      <button class="slide-btn active" id="btn-veh-fuel" onclick="switchVehicleTab('fuel', 0)">車輛燃料</button>
      <button class="slide-btn" id="btn-veh-maint" onclick="switchVehicleTab('maintenance', 1)">保養維修</button>
    </div>

    <div id="vehicle-content" style="flex:1; overflow-y:auto; padding-bottom:24px;"></div>
  </section>

  <!-- ══ 功能設定 ════════════════════════════════════ -->
  <section class="page" id="page-settings">
    <div class="pg-title">功能設定</div>
    <div id="settings-content"></div>
  </section>

  <!-- ══ 底部導覽列 ══════════════════════════════════ -->
  <nav id="nav">
    <div class="ni active" data-pg="home" data-img1="images/home1.png" data-img2="images/home2.png"><img class="ni-img" src="images/home1.png"><span class="lb">首頁</span></div>
    <div class="ni" data-pg="history" data-img1="images/history1.png" data-img2="images/history2.png"><img class="ni-img" src="images/history1.png"><span class="lb">查看記錄</span></div>
    <div class="ni" data-pg="add" data-img1="images/add-record1.png" data-img2="images/add-record2.png"><img class="ni-img" src="images/add-record1.png"><span class="lb">新增</span></div>
    <div class="ni" data-pg="report" data-img1="images/report1.png" data-img2="images/report2.png"><img class="ni-img" src="images/report1.png"><span class="lb">收入分析</span></div>
    <div class="ni" data-pg="vehicles" data-img1="images/scooter1.png" data-img2="images/scooter2.png"><img class="ni-img" src="images/scooter1.png"><span class="lb">車輛管理</span></div>
    <div class="ni" data-pg="settings" data-img1="images/settings1.png" data-img2="images/settings2.png"><img class="ni-img" src="images/settings1.png"><span class="lb">設定</span></div>
  </nav>

</div><!-- /#app -->

<!-- ══ Overlays ════════════════════════════════ -->
<div class="overlay-page" id="search-page">
  <div class="top-bar"><button class="bar-btn" onclick="closeOverlay('search-page')">✕</button><h2>🔍 搜尋記錄</h2><div style="width:36px"></div></div>
  <div class="overlay-body">
    <div style="display:flex;gap:8px;margin-bottom:10px"><input type="text" class="finp" id="search-kw" placeholder="關鍵字、平台名稱、金額..." style="flex:1"><button onclick="doSearch()" class="btn-acc" style="padding:10px 16px;border-radius:var(--rs);white-space:nowrap">搜尋</button></div>
    <div style="display:flex;gap:8px;margin-bottom:14px"><input type="date" class="finp" id="search-from" style="flex:1"><input type="date" class="finp" id="search-to" style="flex:1"></div>
    <div id="search-results" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
</div>

<div class="overlay-page" id="sub-page">
  <div class="top-bar"><button class="bar-btn" onclick="closeOverlay('sub-page')">✕</button><h2 id="sub-title">設定</h2><div style="width:36px"></div></div>
  <div class="overlay-body" id="sub-body"></div>
</div>

<div id="detail-overlay">
  <div id="detail-box">
    <div class="top-bar" style="border-radius:20px 20px 0 0"><button class="bar-btn" onclick="closeDetailOverlay()">✕</button><h2>記錄詳情</h2><div style="width:36px"></div></div>
    <div id="detail-body" style="padding:16px 16px 32px;overflow-y:auto;max-height:70vh"></div>
  </div>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <div id="confirm-msg"></div>
    <div style="display:flex;gap:10px;margin-top:20px">
      <button id="confirm-cancel-btn" style="flex:1;padding:12px;border-radius:var(--rs);border:none;background:var(--sf2);color:var(--t2);font-size:14px;font-family:var(--sans);cursor:pointer">取消</button>
      <button id="confirm-ok-btn" style="flex:1;padding:12px;border-radius:var(--rs);border:none;background:var(--red);color:#fff;font-size:14px;font-family:var(--sans);cursor:pointer;font-weight:600">確定</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- 還原用隱藏 file input -->
<input type="file" id="restore-file" accept=".json" style="display:none">

<div class="overlay-page" id="full-calendar-overlay" style="background:var(--bg); z-index:900;">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeFullCalendar()">✕</button>
    <div style="display:flex;align-items:center;gap:12px;"><button class="mbtn" onclick="changeFullCalMonth(-1)">◀</button><h2 id="fc-title" style="font-size:18px;min-width:100px;text-align:center;"></h2><button class="mbtn" onclick="changeFullCalMonth(1)">▶</button></div>
    <div style="width:36px"></div>
  </div>
  <div class="overlay-body" id="fc-body" style="padding:0; display:flex; flex-direction:column; height:100%;">
    <div id="fc-dow" style="display:grid; grid-template-columns:repeat(7,1fr); background:var(--sf); border-bottom:1px solid var(--border);"></div>
    <div id="fc-grid" style="display:grid; grid-template-columns:repeat(7,1fr); flex:1; overflow-y:auto; background:var(--border); gap:1px;"></div>
  </div>
</div>

<div class="overlay-page" id="vehicle-add-page">
  <div class="top-bar"><button class="bar-btn" onclick="closeOverlay('vehicle-add-page')">✕</button><h2>新增車輛</h2><div style="width:36px"></div></div>
  <div class="overlay-body" id="vehicle-add-body"></div>
</div>

<!-- ══ 車輛記錄整合表單 Overlay ════════════════════════ -->
<div class="overlay-page" id="veh-rec-add-page">
  <div class="top-bar">
    <button class="bar-btn" onclick="closeOverlay('veh-rec-add-page')">✕</button>
    <h2 id="veh-rec-title">新增車輛記錄</h2>
    <button id="veh-save-btn" onclick="confirmAddVehRec()" title="儲存" style="width:30px; height:30px; padding:0; background:transparent; border:none; cursor:pointer; outline:none; transition:transform 0.2s;">
      <img id="veh-save-img" src="images/Check1.png" alt="儲存" style="width:100%; height:100%; object-fit:contain;">
    </button>
  </div>
  <div class="overlay-body">
    <div style="margin-bottom:12px;"><div class="form-lbl">🚗 選擇車輛</div><div id="veh-rec-veh-icons" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:8px;"></div></div>
    <div class="slide-tabs tabs-2" style="margin-bottom:16px;">
      <div class="slide-bg" id="veh-form-tab-bg" style="transform: translateX(0%);"></div>
      <button class="slide-btn active" id="btn-form-fuel" onclick="switchVehFormTab('fuel', 0)">車輛燃料</button>
      <button class="slide-btn" id="btn-form-maint" onclick="switchVehFormTab('maintenance', 1)">保養維修</button>
    </div>
    <div style="display:flex; gap:10px; margin-bottom:16px;">
      <div class="fg" style="flex:1.5"><label>📆 日期</label><input type="date" class="finp" id="vr-date"></div>
      <div class="fg" style="flex:1"><label>⏱ 時間</label><input type="time" class="finp" id="vr-time"></div>
    </div>
    <div id="form-area-fuel">
      <div style="display:flex; gap:10px; margin-bottom:12px;">
        <div class="fg" style="flex:1"><label>汽油類型</label><select class="fsel" id="vr-fuel-type"><option value="92">92 無鉛</option><option value="95" selected>95 無鉛</option><option value="98">98 無鉛</option><option value="柴油">柴油</option></select></div>
        <div class="fg" style="flex:1"><label>折扣 (NT$)</label><input type="number" class="finp" id="vr-discount" value="0" oninput="calcVehFuel()"></div>
      </div>
      <div style="display:flex; gap:10px; margin-bottom:12px;">
        <div class="fg" style="flex:1"><label>上次里程 (km)</label><input type="number" class="finp" id="vr-prev-km"></div>
        <div class="fg" style="flex:1"><label>加油里程 (km)</label><input type="number" class="finp" id="vr-curr-km"></div>
      </div>
      <div style="display:flex; gap:10px; margin-bottom:16px;">
        <div class="fg" style="flex:1"><label>油量 (公升)</label><input type="number" class="finp" id="vr-liters" step="0.01" oninput="calcVehFuel()"></div>
        <div class="fg" style="flex:1"><label>油價 (單價)</label><input type="number" class="finp" id="vr-price" step="0.1" oninput="calcVehFuel()"></div>
      </div>
      <div style="background:var(--sf2); padding:12px; border-radius:12px; text-align:right; margin-bottom:16px;">
        <div style="font-size:12px; color:var(--t3);">折扣前總額：NT$ <span id="vr-before-total">0</span></div>
        <div style="font-size:14px; font-weight:bold; color:var(--t1); margin-top:4px;">付款金額：<span style="font-size:24px; color:var(--acc);" id="vr-final-total">0</span></div>
      </div>
    </div>
    <div id="form-area-maint" style="display:none;">
      <div class="fg" style="margin-bottom:16px;"><label>目前里程 (km)</label><input type="number" class="finp" id="vm-km"></div>
      <div class="fg" style="margin-bottom:16px;"><label>保養維修項目 (可複選)</label><div id="vm-items-container" style="display:flex; flex-wrap:wrap; gap:6px;"></div></div>
      <div class="fg" style="margin-bottom:16px;"><label>店家名稱</label><input type="text" class="finp" id="vm-shop" placeholder="輸入車行名稱"><div id="shop-history-container" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;"></div></div>
      <div style="display:flex; gap:10px; margin-bottom:16px;">
        <div class="fg" style="flex:1.5"><label>支付方式</label><select class="fsel" id="vm-pay-method"><option value="現金">現金</option><option value="電子支付">電子支付</option><option value="銀行帳戶">銀行帳戶</option></select></div>
        <div class="fg" style="flex:1"><label>💰 金額</label><input type="number" class="finp" id="vm-amount" style="font-weight:bold; color:var(--acc);"></div>
      </div>
      <div class="fg" style="margin-bottom:16px;"><label>📝 備註</label><input type="text" class="finp" id="vm-note"></div>
    </div>
    <button id="veh-rec-del-btn" onclick="deleteVehRecFromEdit()" class="btn-danger" style="width:100%; display:none; padding:14px; font-weight:700; margin-top:10px;">🗑 刪除此記錄</button>
    <div style="height: 40px;"></div>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
